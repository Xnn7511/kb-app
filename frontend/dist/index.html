<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高分子材料原料知识库 - PolymerKB</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand" data-page="home">
                <span class="brand-icon">🧪</span>
                <span class="brand-text">PolymerKB</span>
            </a>
            <div class="nav-links">
                <a href="#" class="nav-link active" data-page="home">📚 资料库</a>
                <a href="#" class="nav-link" data-page="compare">📊 对比</a>
                <a href="#" class="nav-link" data-page="experiment">🔬 实验方案</a>
                <a href="#" class="nav-link" data-page="chat">💬 智能问答</a>
                <a href="#" class="nav-link admin-only" data-page="admin" style="display:none">⚙️ 管理</a>
                <a href="#" class="nav-link" id="loginBtn" data-page="login">🔑 登录</a>
                <a href="#" class="nav-link" id="logoutBtn" style="display:none">退出</a>
            </div>
            <button class="nav-toggle" id="navToggle">☰</button>
        </div>
    </nav>

    <!-- 主体布局 -->
    <div class="app-layout" id="app-layout">
        <!-- 侧边栏折叠按钮 -->
        <button class="sidebar-toggle" id="sidebar-toggle" title="展开/收起侧边栏">◀</button>

        <!-- 左侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-title">🔍 快速搜索</h3>
                <input type="text" class="sidebar-search" id="sidebar-search" placeholder="搜索资料...">
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-title collapsible" data-target="sidebar-material-tags">📌 材料类型 <span class="collapse-icon">▼</span></h3>
                <div class="sidebar-tags" id="sidebar-material-tags"></div>
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-title collapsible" data-target="sidebar-function-tags">🏷 功效特性 <span class="collapse-icon">▼</span></h3>
                <div class="sidebar-tags" id="sidebar-function-tags"></div>
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-title collapsible" data-target="sidebar-manufacturer-tags">🏭 厂家分类 <span class="collapse-icon">▼</span></h3>
                <div class="sidebar-tags" id="sidebar-manufacturer-tags"></div>
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-title collapsible" data-target="sidebar-stats">📊 统计概览 <span class="collapse-icon">▼</span></h3>
                <div class="sidebar-stats" id="sidebar-stats">
                    <div class="stat-item"><span class="stat-num" id="stat-total">0</span> 资料总数</div>
                    <div class="stat-item"><span class="stat-num" id="stat-en">0</span> 英文资料</div>
                    <div class="stat-item"><span class="stat-num" id="stat-tds">0</span> 含TDS数据</div>
                </div>
            </div>
        </aside>

        <!-- 右侧主内容 -->
        <main class="main-area" id="main-content"></main>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-container">
            <p>高分子材料原料知识库 v2.0 | 基于 BOPP 厂商资料 | Powered by AI</p>
        </div>
    </footer>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- 模态框 -->
    <div id="modal-overlay" class="modal-overlay" style="display:none">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <script src="/assets/app.js"></script>
</body>
</html>
